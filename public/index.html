<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Architecture TA</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #1a1a1a;
      }
      .app {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px 16px;
      }
      .card {
        background: #fff;
        border: 1px solid #e4e7ec;
        border-radius: 12px;
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }
      p {
        margin: 0 0 16px;
        color: #475467;
      }
      #chat {
        height: 430px;
        overflow-y: auto;
        border: 1px solid #e4e7ec;
        border-radius: 10px;
        padding: 12px;
        background: #fcfcfd;
      }
      .message {
        padding: 10px 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        white-space: pre-wrap;
      }
      .user {
        background: #e6f0ff;
      }
      .assistant {
        background: #ecfdf3;
      }
      .role {
        font-size: 0.8rem;
        font-weight: 600;
        opacity: 0.8;
        margin-bottom: 4px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      textarea {
        flex: 1;
        min-height: 70px;
        resize: vertical;
        border: 1px solid #d0d5dd;
        border-radius: 8px;
        padding: 10px;
        font: inherit;
      }
      button {
        border: none;
        border-radius: 8px;
        background: #344054;
        color: #fff;
        padding: 0 16px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="card">
        <h1>Architecture Teaching Assistant</h1>
        <p>
          Describe what you want to build. The TA will guide your architecture thinking with questions.
        </p>
        <div id="chat"></div>
        <div class="row">
          <textarea id="input" placeholder="I want to build a blog application..."></textarea>
          <button id="send">Send</button>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
